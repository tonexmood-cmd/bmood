<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>bmood 견적서 발행</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=DM+Sans:wght@400;500;700&display=swap');

  :root{
    --cream:#F2EFE9;
    --ink:#33312C;
    --shell-pink:#D9C3B8;
    --sand:#C7B49A;
    --line:#D8D2C6;
    --white:#FFFFFF;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    background:var(--cream);
    color:var(--ink);
    font-family:'DM Sans', sans-serif;
    padding:40px 20px 80px;
  }

  .wrap{
    max-width:900px;
    margin:0 auto;
  }

  h1.brand{
    font-family:'IM Fell English', serif;
    font-style:italic;
    font-size:40px;
    letter-spacing:1px;
    margin:0 0 4px;
  }

  .tagline{
    font-size:13px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:#8A8175;
    margin-bottom:32px;
  }

  .panel{
    background:var(--white);
    border:1px solid var(--line);
    border-radius:2px;
    padding:32px;
    margin-bottom:24px;
  }

  .panel h2{
    font-family:'IM Fell English', serif;
    font-style:italic;
    font-size:22px;
    margin:0 0 20px;
    padding-bottom:10px;
    border-bottom:1px solid var(--line);
  }

  .grid2{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:24px;
  }

  label{
    display:block;
    font-size:12px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:#8A8175;
    margin-bottom:6px;
    margin-top:14px;
  }

  label:first-child{margin-top:0;}

  input, textarea{
    width:100%;
    padding:9px 10px;
    border:1px solid var(--line);
    border-radius:2px;
    background:var(--cream);
    font-family:'DM Sans', sans-serif;
    font-size:14px;
    color:var(--ink);
  }

  textarea{resize:vertical;min-height:60px;}

  table{
    width:100%;
    border-collapse:collapse;
    margin-top:8px;
  }

  th{
    text-align:left;
    font-size:11px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:#8A8175;
    padding:8px 6px;
    border-bottom:1px solid var(--line);
  }

  td{
    padding:6px;
    border-bottom:1px solid var(--line);
  }

  td input{padding:7px 8px;font-size:13px;}

  .num{text-align:right;}

  .rm-btn{
    background:none;
    border:none;
    color:#B5806E;
    cursor:pointer;
    font-size:13px;
    padding:4px 6px;
  }

  .star-btn{
    color:#8A8175;
  }

  .add-row{
    margin-top:14px;
    background:var(--cream);
    border:1px dashed var(--sand);
    color:var(--ink);
    padding:8px 16px;
    border-radius:2px;
    cursor:pointer;
    font-size:13px;
    font-family:'DM Sans', sans-serif;
  }

  .preset-bar{
    display:flex;
    gap:10px;
    align-items:center;
    margin-bottom:20px;
    padding-bottom:16px;
    border-bottom:1px solid var(--line);
    flex-wrap:wrap;
  }

  .preset-bar select{
    flex:1;
    min-width:180px;
    padding:9px 10px;
    border:1px solid var(--line);
    border-radius:2px;
    background:var(--cream);
    font-family:'DM Sans', sans-serif;
    font-size:13px;
    color:var(--ink);
  }

  .btn-outline{
    background:none;
    border:1px solid var(--sand);
    color:var(--ink);
    padding:8px 14px;
    border-radius:2px;
    cursor:pointer;
    font-size:12px;
    letter-spacing:0.5px;
    font-family:'DM Sans', sans-serif;
    white-space:nowrap;
  }

  .btn-outline:hover{background:var(--cream);}

  .btn-outline.danger{
    border-color:#D8B8AC;
    color:#B5806E;
  }

  .preset-section{
    margin-top:20px;
    padding-top:16px;
    border-top:1px solid var(--line);
  }

  .preset-section > label{margin-top:0;}

  .preset-chip-list{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:8px;
  }

  .preset-chip{
    display:flex;
    align-items:center;
    gap:6px;
    background:var(--cream);
    border:1px solid var(--line);
    border-radius:14px;
    padding:6px 8px 6px 14px;
    font-size:12px;
  }

  .preset-chip button{
    background:none;
    border:none;
    cursor:pointer;
    font-size:12px;
    padding:2px 4px;
  }

  .preset-chip .load-btn{color:var(--ink);font-weight:500;}
  .preset-chip .del-btn{color:#B5806E;}

  .preset-empty{
    font-size:12px;
    color:#B5A98C;
    margin-top:8px;
  }

  .totals{
    margin-top:20px;
    margin-left:auto;
    width:280px;
  }

  .totals div{
    display:flex;
    justify-content:space-between;
    padding:6px 0;
    font-size:14px;
  }

  .totals .grand{
    border-top:1px solid var(--ink);
    margin-top:6px;
    padding-top:12px;
    font-weight:700;
    font-size:18px;
  }

  .actions{
    text-align:center;
    margin-top:8px;
  }

  .btn-primary{
    background:var(--ink);
    color:var(--cream);
    border:none;
    padding:14px 40px;
    border-radius:2px;
    font-size:14px;
    letter-spacing:1px;
    text-transform:uppercase;
    cursor:pointer;
    font-family:'DM Sans', sans-serif;
  }

  .btn-primary:hover{background:#4a4740;}

  /* ---------- PREVIEW / PRINT DOCUMENT ---------- */
  #preview{display:none;}

  .doc{
    background:var(--white);
    padding:60px;
    border:1px solid var(--line);
  }

  .doc-banner{
    position:relative;
    width:100%;
    height:140px;
    border-radius:2px;
    overflow:hidden;
    margin-bottom:28px;
  }

  .doc-banner img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  .doc-banner::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(180deg, rgba(242,239,233,0) 40%, rgba(242,239,233,0.9) 100%);
  }

  .form-banner{
    position:relative;
    width:100%;
    height:110px;
    border-radius:2px;
    overflow:hidden;
    margin-bottom:24px;
  }

  .form-banner img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    opacity:0.9;
  }

  .doc-head{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    border-bottom:2px solid var(--ink);
    padding-bottom:24px;
    margin-bottom:32px;
  }

  .doc-head h1{
    font-family:'IM Fell English', serif;
    font-style:italic;
    font-size:36px;
    margin:0;
  }

  .doc-head .tagline{margin-bottom:0;}

  .doc-title{
    text-align:right;
  }

  .doc-title h2{
    font-family:'IM Fell English', serif;
    font-style:italic;
    font-size:28px;
    margin:0 0 6px;
  }

  .doc-title p{margin:2px 0;font-size:13px;color:#8A8175;}

  .doc-parties{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:40px;
    margin-bottom:32px;
  }

  .doc-parties h3{
    font-size:11px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:#8A8175;
    margin:0 0 8px;
  }

  .doc-parties p{margin:2px 0;font-size:14px;line-height:1.5;}

  .doc-table{width:100%;border-collapse:collapse;margin-bottom:24px;}
  .doc-table th{
    background:var(--shell-pink);
    color:var(--ink);
    text-align:left;
    padding:10px 12px;
    font-size:12px;
    letter-spacing:0.5px;
  }
  .doc-table td{
    padding:10px 12px;
    border-bottom:1px solid var(--line);
    font-size:14px;
  }
  .doc-table .num{text-align:right;}

  .doc-totals{
    width:280px;
    margin-left:auto;
  }
  .doc-totals div{
    display:flex;
    justify-content:space-between;
    padding:6px 0;
    font-size:14px;
  }
  .doc-totals .grand{
    border-top:1px solid var(--ink);
    margin-top:6px;
    padding-top:12px;
    font-weight:700;
    font-size:18px;
  }

  .doc-note{
    margin-top:32px;
    padding-top:20px;
    border-top:1px solid var(--line);
    font-size:13px;
    color:#5c584f;
    white-space:pre-wrap;
    line-height:1.6;
  }

  .doc-footer{
    margin-top:40px;
    text-align:center;
    font-size:12px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:#B5A98C;
  }

  .preview-actions{
    text-align:center;
    margin-bottom:24px;
  }

  .preview-actions button{
    margin:0 6px;
  }

  .btn-secondary{
    background:none;
    border:1px solid var(--ink);
    color:var(--ink);
    padding:14px 28px;
    border-radius:2px;
    font-size:14px;
    letter-spacing:1px;
    text-transform:uppercase;
    cursor:pointer;
    font-family:'DM Sans', sans-serif;
  }

  @media print{
    body{padding:0;background:white;}
    .wrap > *:not(#preview){display:none !important;}
    .preview-actions{display:none !important;}
    #preview{display:block !important;}
    .doc{border:none;padding:0;}
  }
</style>
</head>

<script>
function won(n){
  return '₩' + Math.round(n).toLocaleString('ko-KR');
}

function recalcRow(tr){
  const qty = parseFloat(tr.querySelector('.itemQty').value) || 0;
  const price = parseFloat(tr.querySelector('.itemPrice').value) || 0;
  tr.querySelector('.itemAmount').textContent = won(qty * price);
  recalcTotals();
}

function recalcTotals(){
  let subtotal = 0;
  document.querySelectorAll('#itemBody tr').forEach(tr => {
    const qty = parseFloat(tr.querySelector('.itemQty').value) || 0;
    const price = parseFloat(tr.querySelector('.itemPrice').value) || 0;
    subtotal += qty * price;
  });
  const vat = subtotal * 0.1;
  document.getElementById('subtotal').textContent = won(subtotal);
  document.getElementById('vat').textContent = won(vat);
  document.getElementById('grandTotal').textContent = won(subtotal + vat);
}

function addRow(){
  const tbody = document.getElementById('itemBody');
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td><input class="itemName" value=""></td>
    <td><input class="itemQty" type="number" value="1" min="0"></td>
    <td><input class="itemPrice" type="number" value="0" min="0"></td>
    <td class="num itemAmount">₩0</td>
    <td>
      <button class="rm-btn star-btn" onclick="saveItemPreset(this)">☆ 등록</button>
      <button class="rm-btn" onclick="removeRow(this)">삭제</button>
    </td>
  `;
  tbody.appendChild(tr);
  attachRowListeners(tr);
}

function removeRow(btn){
  const tr = btn.closest('tr');
  if(document.querySelectorAll('#itemBody tr').length > 1){
    tr.remove();
    recalcTotals();
  }
}

function attachRowListeners(tr){
  tr.querySelector('.itemQty').addEventListener('input', () => recalcRow(tr));
  tr.querySelector('.itemPrice').addEventListener('input', () => recalcRow(tr));
}

document.querySelectorAll('#itemBody tr').forEach(attachRowListeners);

// default dates
const today = new Date();
document.getElementById('issueDate').valueAsDate = today;
const valid = new Date();
valid.setDate(today.getDate() + 14);
document.getElementById('validUntil').valueAsDate = valid;

function fmtDate(str){
  if(!str) return '';
  const d = new Date(str);
  return d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');
}

function showPreview(){
  document.getElementById('pQuoteNo').textContent = '견적서 번호  ' + document.getElementById('quoteNo').value;
  document.getElementById('pIssueDate').textContent = '발행일  ' + fmtDate(document.getElementById('issueDate').value);
  document.getElementById('pValidUntil').textContent = '유효기간  ' + fmtDate(document.getElementById('validUntil').value) + ' 까지';

  document.getElementById('pSupplierName').textContent = document.getElementById('supplierName').value;
  document.getElementById('pSupplierContact').textContent = document.getElementById('supplierContact').value;
  document.getElementById('pSupplierEmail').textContent = document.getElementById('supplierEmail').value;

  document.getElementById('pClientName').textContent = document.getElementById('clientName').value || '고객명';
  document.getElementById('pClientContact').textContent = document.getElementById('clientContact').value;
  document.getElementById('pClientEmail').textContent = document.getElementById('clientEmail').value;
  document.getElementById('pClientAddress').textContent = document.getElementById('clientAddress').value;

  const pBody = document.getElementById('pItemBody');
  pBody.innerHTML = '';
  let subtotal = 0;
  document.querySelectorAll('#itemBody tr').forEach(tr => {
    const name = tr.querySelector('.itemName').value;
    const qty = parseFloat(tr.querySelector('.itemQty').value) || 0;
    const price = parseFloat(tr.querySelector('.itemPrice').value) || 0;
    const amount = qty * price;
    subtotal += amount;
    const row = document.createElement('tr');
    row.innerHTML = `
      <td>${name}</td>
      <td class="num">${qty}</td>
      <td class="num">${won(price)}</td>
      <td class="num">${won(amount)}</td>
    `;
    pBody.appendChild(row);
  });

  const vat = subtotal * 0.1;
  document.getElementById('pSubtotal').textContent = won(subtotal);
  document.getElementById('pVat').textContent = won(vat);
  document.getElementById('pGrandTotal').textContent = won(subtotal + vat);
  document.getElementById('pNote').textContent = document.getElementById('note').value;

  document.querySelectorAll('.wrap > .panel, .wrap > .actions, .wrap > h1.brand, .wrap > .tagline').forEach(el => el.style.display = 'none');
  document.getElementById('preview').style.display = 'block';
  window.scrollTo(0,0);
}

function backToEdit(){
  document.querySelectorAll('.wrap > .panel, .wrap > .actions, .wrap > h1.brand, .wrap > .tagline').forEach(el => el.style.display = '');
  document.getElementById('preview').style.display = 'none';
}
</script>
</body>
</html>
